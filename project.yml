name: Merian
options:
  bundleIdPrefix: com.merian
  deploymentTarget:
    iOS: 17.0
    macOS: 14.0

packages:
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios.git
    from: 4.41.0
  PostHog:
    url: https://github.com/PostHog/posthog-ios.git
    from: 3.1.2
  Supabase:
    url: https://github.com/supabase-community/supabase-swift.git
    from: 2.3.0
  TelemetryDeck:
    url: https://github.com/TelemetryDeck/SwiftClient.git
    from: 1.5.0
  RiveRuntime:
    url: https://github.com/rive-app/rive-ios.git
    from: 5.8.0

targets:
  Merian:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources: [Merian]
    configFiles:
      Debug: Config.xcconfig
      Release: Config.xcconfig
    settings:
      base:
        INFOPLIST_FILE: Merian/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2" # iPhone and iPad
    dependencies:
      - target: MerianWatch # Natively bundles the companion watchApp binary directly into the parent iPhone executable
      - package: RevenueCat
      - package: PostHog
      - package: Supabase
      - product: TelemetryClient
        package: TelemetryDeck
      - package: RiveRuntime

  MerianWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources: [MerianWatch]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.merian.Merian.watchkitapp
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.merian.Merian
        INFOPLIST_KEY_WKRunsIndependentlyOfCompanionApp: NO

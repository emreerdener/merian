name: Merian
options:
  bundleIdPrefix: com.merian
  deploymentTarget:
    iOS: 17.0
    macOS: 14.0

packages:
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios.git
    from: 4.41.0
  PostHog:
    url: https://github.com/PostHog/posthog-ios.git
    from: 3.1.2
  Supabase:
    url: https://github.com/supabase-community/supabase-swift.git
    from: 2.3.0
  TelemetryDeck:
    url: https://github.com/TelemetryDeck/SwiftClient.git
    from: 1.5.0
  RiveRuntime:
    url: https://github.com/rive-app/rive-ios.git
    from: 5.8.0

targets:
  Merian:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources: [Merian]
    settings:
      configFiles:
        Debug: Config.xcconfig
        Release: Config.xcconfig
      base:
        INFOPLIST_KEY_GEMINI_API_KEY: $(GEMINI_API_KEY)
        INFOPLIST_KEY_SUPABASE_URL: $(SUPABASE_URL)
        INFOPLIST_KEY_SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
        INFOPLIST_KEY_REVENUECAT_API_KEY: $(REVENUECAT_API_KEY)
        INFOPLIST_KEY_POSTHOG_API_KEY: $(POSTHOG_API_KEY)
        INFOPLIST_KEY_TELEMETRY_APP_ID: $(TELEMETRY_APP_ID)
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchStoryboardName: LaunchScreen
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsMultipleScenes: NO
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        NSCameraUsageDescription: "Merian needs camera access for instant AI-powered ecological identification."
        NSMicrophoneUsageDescription: "Merian needs microphone access for aviary and insect sound classification."
        NSLocationWhenInUseUsageDescription: "Merian requires your location to determine regional ecological context and coordinate mapping."
        TARGETED_DEVICE_FAMILY: "1,2" # iPhone and iPad
    dependencies:
      - target: MerianWatch # Natively bundles the companion watchApp binary directly into the parent iPhone executable
      - package: RevenueCat
      - package: PostHog
      - package: Supabase
      - product: TelemetryClient
        package: TelemetryDeck
      - package: RiveRuntime

  MerianWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources: [MerianWatch]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.merian.Merian.watchkitapp
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.merian.Merian
        INFOPLIST_KEY_WKRunsIndependentlyOfCompanionApp: NO

name: Deploy Merian to Supabase

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_ID: ${{ secrets.PROJECT_ID }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Link Supabase Project
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Project to CLI
        run: supabase link --project-ref $PROJECT_ID --password $DB_PASSWORD

      - name: Push Database Migrations
        run: supabase db push --password $DB_PASSWORD

      - name: Deploy Edge Function - Identify
        run: supabase functions deploy identify --project-ref $PROJECT_ID

      - name: Deploy Edge Function - Generate Upload URLs
        run: supabase functions deploy generate-upload-urls --project-ref $PROJECT_ID

      - name: Deploy Edge Function - Export DwCA
        run: supabase functions deploy export-dwca --project-ref $PROJECT_ID

      - name: Deploy Edge Function - Safe Delete
        run: supabase functions deploy safe-delete --project-ref $PROJECT_ID --no-verify-jwt

      - name: Deploy Edge Function - Get Filtered Discovery Feed
        run: supabase functions deploy get-filtered-discovery-feed --project-ref $PROJECT_ID
